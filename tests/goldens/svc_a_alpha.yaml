apiVersion: v1
kind: Service
metadata:
  labels:
    app: svc-a
  name: svc-a-alpha
spec:
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: svc-a
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: svc-a
  name: svc-a-alpha
spec:
  replicas: 1
  selector:
    matchLabels:
      app: svc-a
  template:
    metadata:
      labels:
        app: svc-a
    spec:
      containers:
      - image: ghcr.io/testorg/svc-a:test-tag
        name: svc-a
        ports:
        - containerPort: 8080
